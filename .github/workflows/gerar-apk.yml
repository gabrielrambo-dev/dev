name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar arquivos do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Instalar dependências
        run: npm install

      - name: Criar projeto Android Capacitor
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Pasta android já existe, pulando cap add."
          fi

      - name: Sincronizar arquivos web com Android
        run: npx cap sync android

      - name: Gerar APK debug
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Enviar APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeStudy-Pro-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
